# NPPatch Sample Dataset Mapping — Meadowlark Youth Literacy
# Load with: cci task run load_dataset --mapping datasets/sample/mapping.yml --sql_path datasets/sample/sample_data.sql
#
# This mapping includes only the fields populated by the sample dataset.
# For a full field mapping, see datasets/mapping.yml (auto-generated).
#
# Load order: parent objects first, then children that reference them.
# Fundraising (NPSP) and Program Management (PMM) objects are interleaved
# so that shared lookups (Account, Contact) resolve correctly.

# ==========================================================================
# Fundraising Objects (NPSP)
# ==========================================================================

Insert Campaign:
  sf_object: Campaign
  fields:
  - Name
  - IsActive
  - Status
  - Type
  - StartDate
  - EndDate
  - Description
  - ExpectedRevenue
  lookups:
    ParentId:
      table:
      - Campaign
      after: Insert Campaign

Insert General_Accounting_Unit__c:
  sf_object: General_Accounting_Unit__c
  fields:
  - Name
  - Active__c
  - Description__c

Insert Engagement_Plan_Template__c:
  sf_object: Engagement_Plan_Template__c
  fields:
