  - Description__c
  - Skip_Weekends__c
  - Default_Assignee__c
  - Automatically_Update_Child_Task_Due_Date__c

Insert Engagement_Plan_Task__c:
  sf_object: Engagement_Plan_Task__c
  fields:
  - Name
  - Days_After__c
  - Priority__c
  - Status__c
  - Type__c
  - Send_Email__c
  - Comments__c
  lookups:
    Engagement_Plan_Template__c:
      table:
      - Engagement_Plan_Template__c
    Parent_Task__c:
      table:
      - Engagement_Plan_Task__c
      after: Insert Engagement_Plan_Task__c

