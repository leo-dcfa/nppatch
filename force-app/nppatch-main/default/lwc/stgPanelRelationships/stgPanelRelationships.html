<template>
    <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_large">
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
    </template>

    <template lwc:if={_hasError}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <p>{_errorMessage}</p>
        </div>
    </template>

    <template lwc:if={_settings}>
        <div class="slds-is-relative slds-p-around_medium">
            <p class="slds-text-color_weak slds-text-body_medium slds-m-bottom_medium">{sectionDescription}</p>

            <lightning-combobox
                label={labels.reciprocalMethod}
                field-level-help={labels.helpReciprocalMethod}
                value={_workingCopy.Reciprocal_Method__c}
                options={reciprocalMethodOptions}
                onchange={handleReciprocalMethodChange}>
            </lightning-combobox>

            <lightning-input type="text" label={labels.genderField}
                field-level-help={labels.helpGenderField}
                value={_workingCopy.Gender_Field__c}
                onchange={handleGenderFieldChange}>
            </lightning-input>

            <lightning-input type="toggle" label={labels.allowDuplicates}
                field-level-help={labels.helpAllowDuplicates}
                checked={_workingCopy.Allow_AutoCreated_Duplicates__c}
                onchange={handleAllowDuplicatesChange}
                message-toggle-active="Enabled" message-toggle-inactive="Disabled">
            </lightning-input>
        </div>
    </template>
</template>
