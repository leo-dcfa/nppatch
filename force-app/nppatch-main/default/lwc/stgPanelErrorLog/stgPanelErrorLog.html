<template>
    <template if:true={isLoading}>
        <div class="loading-container">
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
    </template>
    <template if:true={_hasError}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <p>{_errorMessage}</p>
        </div>
    </template>
    <template if:false={isLoading}>
        <div class="panel-container">
            <div class="panel-header">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <div class="slds-col">
                        <h2 class="slds-text-heading_small">
                            <span class="slds-text-color_weak">System Tools</span>
                            <span class="slds-text-color_weak"> &bull; </span>
                            Error Log
                        </h2>
                    </div>
                    <div class="slds-col_bump-left">
                        <lightning-button label="Refresh" onclick={handleRefresh} variant="neutral" icon-name="utility:refresh"></lightning-button>
                    </div>
                </div>
                <p class="section-description">The Error Log captures errors that occur during NPPatch processing — including trigger handler failures, batch job errors, and scheduled job issues. Review these entries to diagnose and resolve problems. Errors are logged automatically when Error Notifications are enabled.</p>
            </div>
            <div class="panel-body">
                <template if:true={hasRecords}>
                    <lightning-datatable
                        key-field="Id"
                        data={_errors}
                        columns={columns}
                        hide-checkbox-column
                        sorted-by={_sortedBy}
                        sorted-direction={_sortedDirection}
                        onsort={handleSort}
                        max-row-selection="0">
                    </lightning-datatable>
                </template>
                <template if:false={hasRecords}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:success" size="small" class="slds-m-right_x-small"></lightning-icon>
                        <p class="empty-message">No errors recorded. Your system is running clean.</p>
                    </div>
                </template>
            </div>
        </div>
    </template>
</template>
