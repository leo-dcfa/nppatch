<template>
    <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_large">
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
    </template>

    <template lwc:if={_hasError}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <p>{_errorMessage}</p>
        </div>
    </template>

    <template lwc:if={_settings}>
        <div class="slds-is-relative slds-p-around_medium">
            <p class="slds-text-color_weak slds-text-body_medium slds-m-bottom_medium">{sectionDescription}</p>

            <lightning-input type="toggle" label={labels.autoCampaignMember}
                checked={_workingCopy.Automatic_Campaign_Member_Management__c}
                onchange={handleAutoChange}
                message-toggle-active="Enabled" message-toggle-inactive="Disabled">
            </lightning-input>

            <lightning-input type="text" label={labels.respondedStatus}
                value={_workingCopy.Campaign_Member_Responded_Status__c}
                onchange={handleRespondedChange}>
            </lightning-input>

            <lightning-input type="text" label={labels.nonRespondedStatus}
                value={_workingCopy.Campaign_Member_Non_Responded_Status__c}
                onchange={handleNonRespondedChange}>
            </lightning-input>
        </div>
    </template>
</template>
