<template>
    <div class="slds-combobox_container">
        <div class={comboboxContainerClass} aria-expanded={isDropdownOpen} aria-haspopup="listbox" role="combobox">
            <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                <lightning-input
                    label={findOrAddLabel}
                    placeholder={findInContactsLabel}
                    value={searchTerm}
                    onchange={handleSearchInput}
                    variant="label-hidden"
                    class="search-input"
                ></lightning-input>
                <template lwc:if={isSearching}>
                    <lightning-spinner alternative-text="Searching" size="small" class="slds-input__spinner"></lightning-spinner>
                </template>
            </div>
            <template lwc:if={isDropdownOpen}>
                <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                    <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                        <template for:each={searchResults} for:item="result">
                            <li key={result.Id} role="presentation" class="slds-listbox__item">
                                <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                     role="option"
                                     data-id={result.Id}
                                     onclick={handleSelectContact}>
                                    <span class="slds-media__figure slds-listbox__option-icon">
                                        <lightning-icon icon-name="standard:contact" size="small"></lightning-icon>
                                    </span>
                                    <span class="slds-media__body">
                                        <span class="slds-listbox__option-text slds-listbox__option-text_entity">{result.Name}</span>
                                        <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">{result.AccountName}</span>
                                    </span>
                                </div>
                            </li>
                        </template>
                        <!-- New Contact option -->
                        <li role="presentation" class="slds-listbox__item">
                            <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                 role="option"
                                 onclick={handleNewContact}>
                                <span class="slds-media__figure slds-listbox__option-icon">
                                    <lightning-icon icon-name="utility:add" size="small"></lightning-icon>
                                </span>
                                <span class="slds-media__body">
                                    <span class="slds-listbox__option-text slds-listbox__option-text_entity">{newContactLabel}</span>
                                </span>
                            </div>
                        </li>
                    </ul>
                </div>
            </template>
        </div>
    </div>
</template>
