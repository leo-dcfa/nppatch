<template>
    <div class="slds-box slds-box_x-small slds-m-bottom_x-small slds-theme_default">
        <!-- Contact Name and Actions -->
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_xx-small">
            <div class="slds-col">
                <template lwc:if={isSavedContact}>
                    <a href={contactUrl} class="slds-text-heading_small">{contactName}</a>
                </template>
                <template lwc:else>
                    <span class="slds-text-heading_small">{contactName}</span>
                </template>
            </div>
            <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center">
                <lightning-button-icon
                    icon-name="utility:arrowup"
                    variant="bare"
                    alternative-text="Move up"
                    size="small"
                    onclick={handleMoveUp}
                    disabled={isFirst}
                    class="slds-m-right_xx-small"
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:arrowdown"
                    variant="bare"
                    alternative-text="Move down"
                    size="small"
                    onclick={handleMoveDown}
                    disabled={isLast}
                    class="slds-m-right_small"
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:close"
                    variant="bare"
                    alternative-text="Remove"
                    size="small"
                    onclick={handleRemove}
                ></lightning-button-icon>
            </div>
        </div>

        <!-- Address -->
        <template lwc:if={hasAddress}>
            <div class="slds-text-body_small slds-m-bottom_xx-small">
                <lightning-formatted-text value={formattedAddress}></lightning-formatted-text>
                <template lwc:if={isAddressOverride}>
                    <span class="slds-badge slds-m-left_xx-small">{addressOverrideLabel}</span>
                </template>
            </div>
        </template>
        <template lwc:if={isUndeliverable}>
            <div class="slds-m-bottom_xx-small">
                <lightning-input
                    type="checkbox"
                    label={contactUndeliverableLabel}
                    checked
                    disabled
                ></lightning-input>
            </div>
        </template>

        <!-- Exclusion Checkboxes -->
        <div class="slds-border_top slds-p-top_xx-small slds-m-top_xx-small">
            <span class="slds-text-title slds-m-bottom_xx-small">{excludeFromLabel}</span>
            <div class="slds-grid slds-grid_vertical-align-center slds-m-top_xx-small">
                <lightning-input
                    type="checkbox"
                    label={householdNameLabel}
                    checked={excludeFromName}
                    data-field="Exclude_from_Household_Name__c"
                    onchange={handleExclusionChange}
                    class="slds-m-right_large"
                ></lightning-input>
                <lightning-input
                    type="checkbox"
                    label={formalGreetingLabel}
                    checked={excludeFromFormalGreeting}
                    data-field="Exclude_from_Household_Formal_Greeting__c"
                    onchange={handleExclusionChange}
                    class="slds-m-right_large"
                ></lightning-input>
                <lightning-input
                    type="checkbox"
                    label={informalGreetingLabel}
                    checked={excludeFromInformalGreeting}
                    data-field="Exclude_from_Household_Informal_Greeting__c"
                    onchange={handleExclusionChange}
                ></lightning-input>
            </div>
        </div>
    </div>
</template>
