<template>

                    value={householdName}

            </div>
            <div class="slds-col slds-size_4-of-12 checkbox-align">
                <lightning-input

                ></lightning-input>
            </div>
        </div>

        <div class="slds-grid slds-gutters_small slds-m-bottom_small">

                ></lightning-input>
            </div>

                <lightning-input
                    type="checkbox"
                    label={autoFormalLabel}
                    checked={isAutoFormalGreeting}
                    onchange={handleAutoFormalChange}
                ></lightning-input>
            </div>
        </div>

        <div class="slds-grid slds-gutters_small">
            <div class="slds-col slds-size_8-of-12">
                <lightning-input
                    value={informalGreeting}

                ></lightning-input>

                <lightning-input
                    type="checkbox"

                ></lightning-input>

        </div>
