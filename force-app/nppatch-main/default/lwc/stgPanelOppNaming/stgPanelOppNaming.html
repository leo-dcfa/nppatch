<template>
    <template if:true="{isLoading}">
        <div class="loading-container">
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
    </template>

    <template if:true="{_hasError}">
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <p>{_errorMessage}</p>
        </div>
    </template>

    <template if:true="{isReady}">
        <div class="panel-container">
            <div class="panel-header">
                <p class="section-description">{labels.description}</p>
            </div>

            <div class="panel-body">
                <template if:true="{_isAdmin}">
                    <template if:false="{_isCreating}">
                        <div class="{actionBarClass}">
                            <lightning-button
                                label="New"
                                onclick="
                                    {
                                        handleNewClick;
                                    }
                                "
                                variant="neutral"
                                icon-name="utility:add"
                            ></lightning-button>
                        </div>
                    </template>
                </template>
                <template if:true="{_isCreating}">
                    <div class="create-form">
                        <h3 class="section-subheader">New Opportunity Naming Rule</h3>
                        <div class="form-row">
                            <lightning-combobox
                                label="Attribution"
                                value="{_newAttribution}"
                                options="{attributionOptions}"
                                onchange="
                                    {
                                        handleAttributionChange;
                                    }
                                "
                                placeholder="Select attribution..."
                                required
                            ></lightning-combobox>
                            <lightning-combobox
                                label="Name Format"
                                value="{newFormatComboValue}"
                                options="{nameFormatOptions}"
                                onchange="
                                    {
                                        handleFormatComboChange;
                                    }
                                "
                                field-level-help="The merge-field template used to generate Opportunity names. Select a preset or choose Other to enter a custom format."
                            ></lightning-combobox>
                            <lightning-combobox
                                label="Date Format"
                                value="{newDateComboValue}"
                                options="{dateFormatOptions}"
                                onchange="
                                    {
                                        handleDateComboChange;
                                    }
                                "
                                field-level-help="Controls how dates appear in the generated name. Leave as Default to use the org locale format."
                            ></lightning-combobox>
                        </div>
                        <template lwc:if="{isNewCustomDate}">
                            <lightning-input
                                type="text"
                                label="Custom Date Pattern"
                                value="{_newDateFormat}"
                                onchange="
                                    {
                                        handleCustomDateChange;
                                    }
                                "
                                placeholder="yyyy-MM-dd"
                                field-level-help="Java SimpleDateFormat pattern, e.g. yyyy-MM-dd or MM/dd/yyyy."
                                class="slds-m-top_small"
                            ></lightning-input>
                        </template>
                        <template lwc:if="{isNewCustomFormat}">
                            <lightning-input
                                type="text"
                                label="Custom Name Format"
                                value="{_newNameFormat}"
                                onchange="
                                    {
                                        handleCustomFormatChange;
                                    }
                                "
                                placeholder="{customFormatPlaceholder}"
                                class="slds-m-top_small"
                            ></lightning-input>
                            <template lwc:if="{newFormatWarnings}">
                                <div class="warning-box">
                                    <lightning-icon
                                        icon-name="utility:warning"
                                        size="xx-small"
                                        variant="warning"
                                        class="slds-m-right_xx-small"
                                    ></lightning-icon>
                                    {newFormatWarnings}
                                </div>
                            </template>
                        </template>
                        <template lwc:if="{newFormatPreview}">
                            <div class="preview-box">
                                <span class="preview-label">Preview:</span> {newFormatPreview}
                            </div>
                        </template>
                        <template lwc:if="{isNewPreviewUnavailable}">
                            <div class="preview-box preview-unavailable">
                                <span class="preview-label">Preview:</span> Unavailable for custom formats
                            </div>
                        </template>
                        <div class="form-actions">
                            <lightning-button
                                label="Save"
                                onclick="
                                    {
                                        handleSaveCreate;
                                    }
                                "
                                variant="brand"
                                disabled="{isSaveDisabled}"
                            ></lightning-button>
                            <lightning-button
                                label="Cancel"
                                onclick="
                                    {
                                        handleCancelCreate;
                                    }
                                "
                                variant="neutral"
                                disabled="{_isSaving}"
                            ></lightning-button>
                        </div>
                    </div>
                </template>

                <template if:true="{_isEditing}">
                    <div class="create-form">
                        <h3 class="section-subheader">Edit Opportunity Naming Rule</h3>
                        <div class="form-row">
                            <lightning-combobox
                                label="Attribution"
                                value="{_editRecord.Attribution__c}"
                                options="{attributionOptions}"
                                onchange="
                                    {
                                        handleEditAttributionChange;
                                    }
                                "
                                required
                            ></lightning-combobox>
                            <lightning-combobox
                                label="Name Format"
                                value="{editFormatComboValue}"
                                options="{nameFormatOptions}"
                                onchange="
                                    {
                                        handleEditFormatComboChange;
                                    }
                                "
                                field-level-help="The merge-field template used to generate Opportunity names. Select a preset or choose Other to enter a custom format."
                            ></lightning-combobox>
                            <lightning-combobox
                                label="Date Format"
                                value="{editDateComboValue}"
                                options="{dateFormatOptions}"
                                onchange="
                                    {
                                        handleEditDateComboChange;
                                    }
                                "
                                field-level-help="Controls how dates appear in the generated name. Leave as Default to use the org locale format."
                            ></lightning-combobox>
                        </div>
                        <template lwc:if="{isEditCustomDate}">
                            <lightning-input
                                type="text"
                                label="Custom Date Pattern"
                                value="{_editRecord.Date_Format__c}"
                                onchange="
                                    {
                                        handleEditCustomDateChange;
                                    }
                                "
                                placeholder="yyyy-MM-dd"
                                field-level-help="Java SimpleDateFormat pattern, e.g. yyyy-MM-dd or MM/dd/yyyy."
                                class="slds-m-top_small"
                            ></lightning-input>
                        </template>
                        <template lwc:if="{isEditCustomFormat}">
                            <lightning-input
                                type="text"
                                label="Custom Name Format"
                                value="{_editRecord.Opportunity_Name_Format__c}"
                                onchange="
                                    {
                                        handleEditCustomFormatChange;
                                    }
                                "
                                placeholder="{customFormatPlaceholder}"
                                class="slds-m-top_small"
                            ></lightning-input>
                            <template lwc:if="{editFormatWarnings}">
                                <div class="warning-box">
                                    <lightning-icon
                                        icon-name="utility:warning"
                                        size="xx-small"
                                        variant="warning"
                                        class="slds-m-right_xx-small"
                                    ></lightning-icon>
                                    {editFormatWarnings}
                                </div>
                            </template>
                        </template>
                        <template lwc:if="{editFormatPreview}">
                            <div class="preview-box">
                                <span class="preview-label">Preview:</span> {editFormatPreview}
                            </div>
                        </template>
                        <template lwc:if="{isEditPreviewUnavailable}">
                            <div class="preview-box preview-unavailable">
                                <span class="preview-label">Preview:</span> Unavailable for custom formats
                            </div>
                        </template>
                        <div class="form-actions">
                            <lightning-button
                                label="Save"
                                onclick="
                                    {
                                        handleSaveEdit;
                                    }
                                "
                                variant="brand"
                                disabled="{isEditSaveDisabled}"
                            ></lightning-button>
                            <lightning-button
                                label="Cancel"
                                onclick="
                                    {
                                        handleCancelEdit;
                                    }
                                "
                                variant="neutral"
                                disabled="{_isSaving}"
                            ></lightning-button>
                        </div>
                    </div>
                </template>

                <template if:true="{hasRecords}">
                    <lightning-datatable
                        key-field="Id"
                        data="{_records}"
                        columns="{columns}"
                        onrowaction="{handleRowAction}"
                        hide-checkbox-column
                    ></lightning-datatable>
                </template>

                <template if:false="{hasRecords}">
                    <p class="empty-message">No opportunity naming settings defined.</p>
                </template>
            </div>
        </div>
    </template>
</template>
