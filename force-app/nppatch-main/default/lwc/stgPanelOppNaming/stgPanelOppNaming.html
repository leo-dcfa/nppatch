<template>
    <template if:true={isLoading}>
        <div class="loading-container">
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
    </template>

    <template if:true={_hasError}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <p>{_errorMessage}</p>
        </div>
    </template>

    <template if:true={isReady}>
        <div class="panel-container">
            <div class="panel-header">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <div class="slds-col">
                        <h2 class="slds-text-heading_small">
                            <span class="slds-text-color_weak">{labels.sectionLabel}</span>
                            <span class="slds-text-color_weak"> &bull; </span>
                            {labels.pageLabel}
                        </h2>
                    </div>
                    <div class="slds-col_bump-left">
                        <template if:true={_isAdmin}>
                            <template if:false={_isCreating}>
                                <lightning-button
                                    label="New"
                                    onclick={handleNewClick}
                                    variant="neutral"
                                    icon-name="utility:add"
                                ></lightning-button>
                            </template>
                        </template>
                    </div>
                </div>
                <p class="section-description">{labels.description}</p>
            </div>

            <div class="panel-body">
                <template if:true={_isCreating}>
                    <div class="create-form">
                        <h3 class="section-subheader">New Opportunity Naming Rule</h3>
                        <div class="form-grid">
                            <lightning-combobox
                                label="Attribution"
                                value={_newAttribution}
                                options={attributionOptions}
                                onchange={handleAttributionChange}
                                placeholder="Select attribution..."
                                required
                                class="picklist-input"
                            ></lightning-combobox>
                            <lightning-input
                                type="text"
                                label="Name Format"
                                value={_newNameFormat}
                                onchange={handleNameFormatChange}
                                class="text-input"
                            ></lightning-input>
                            <lightning-input
                                type="text"
                                label="Date Format"
                                value={_newDateFormat}
                                onchange={handleDateFormatChange}
                                class="text-input"
                            ></lightning-input>
                        </div>
                        <div class="form-actions">
                            <lightning-button
                                label="Save"
                                onclick={handleSaveCreate}
                                variant="brand"
                                disabled={isSaveDisabled}
                            ></lightning-button>
                            <lightning-button
                                label="Cancel"
                                onclick={handleCancelCreate}
                                variant="neutral"
                                disabled={_isSaving}
                            ></lightning-button>
                        </div>
                    </div>
                </template>

                <template if:true={hasRecords}>
                    <lightning-datatable
                        key-field="Id"
                        data={_records}
                        columns={columns}
                        onrowaction={handleRowAction}
                        hide-checkbox-column
                    ></lightning-datatable>
                </template>

                <template if:false={hasRecords}>
                    <p class="empty-message">No opportunity naming settings defined.</p>
                </template>
            </div>
        </div>
    </template>
</template>
