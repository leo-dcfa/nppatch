<template>
    <div class="panel-container">
        <div class="panel-header">
            <h2 class="slds-text-heading_small">
                <span class="slds-text-color_weak">System Tools</span>
                <span class="slds-text-color_weak"> &bull; </span>
                Health Check
            </h2>
            <p class="section-description">Health Check validates your NPPatch configuration and data integrity. It checks for common issues like missing required settings, invalid record type references, broken trigger handlers, and data inconsistencies. Run this after major configuration changes or when troubleshooting issues.</p>
        </div>
        <div class="panel-body">
            <div class="action-row">
                <template if:false={_isRunning}>
                    <lightning-button label="Run Health Check" onclick={handleRunHealthCheck} variant="brand"></lightning-button>
                    <lightning-button label="Reinitialize TDTM &amp; Scheduled Jobs" onclick={handleReinitialize} variant="neutral" class="slds-m-left_small"></lightning-button>
                </template>
                <template if:true={_isRunning}>
                    <div class="slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
                        <div class="slds-col">
                            <lightning-spinner alternative-text="Running" size="small" class="inline-spinner"></lightning-spinner>
                        </div>
                        <div class="slds-col">
                            <p class="running-message">{_runningMessage}</p>
                        </div>
                    </div>
                </template>
            </div>

            <template if:true={_hasResults}>
                <div class="results-summary">
                    <div class="summary-badges">
                        <span class="badge badge-pass">{_passCount} Passed</span>
                        <span class="badge badge-fail">{_failCount} Failed</span>
                        <span class="badge badge-warn">{_warnCount} Warnings</span>
                    </div>
                </div>

                <template for:each={_results} for:item="result">
                    <div key={result.id} class={result.rowClass}>
                        <div class="result-header">
                            <lightning-icon icon-name={result.iconName} size="x-small" class="result-icon"></lightning-icon>
                            <span class="result-setting">{result.setting}</span>
                        </div>
                        <p class="result-description">{result.description}</p>
                        <template if:true={result.solution}>
                            <p class="result-solution"><strong>Solution:</strong> {result.solution}</p>
                        </template>
                    </div>
                </template>
            </template>
        </div>
    </div>
</template>
