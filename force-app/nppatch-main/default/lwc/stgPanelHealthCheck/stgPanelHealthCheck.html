<template>
    <article class="slds-card">
        <div class="card-content">
            <div class="card-header">
                <lightning-icon icon-name="utility:heart" size="small"></lightning-icon>
                <h2 class="slds-text-heading_small">Health Check</h2>
                <template lwc:if={_hasResults}>
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        alternative-text="Refresh"
                        title="Re-run health check"
                        onclick={handleRefresh}
                        disabled={_isRunning}
                        class="refresh-btn"
                    ></lightning-button-icon>
                </template>
            </div>

            <p class="section-description">
                Health Check validates your NPPatch configuration and data integrity.
                It checks for common issues like missing required settings, invalid record type references,
                broken trigger handlers, and data inconsistencies.
            </p>

            <template lwc:if={_isRunning}>
                <div class="action-row">
                    <div class="slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
                        <div class="slds-col">
                            <lightning-spinner alternative-text="Running" size="small" class="inline-spinner"></lightning-spinner>
                        </div>
                        <div class="slds-col">
                            <p class="running-message">{_runningMessage}</p>
                        </div>
                    </div>
                </div>
            </template>

            <template lwc:if={_hasResults}>
                <div class="tab-bar">
                    <button class={tabAllClass} onclick={handleTabAll}>
                        All Results
                    </button>
                    <button class={tabErrorsClass} onclick={handleTabErrors}>
                        Errors <span class="tab-badge tab-badge-fail">{_failCount}</span>
                    </button>
                    <button class={tabWarningsClass} onclick={handleTabWarnings}>
                        Warnings <span class="tab-badge tab-badge-warn">{_warnCount}</span>
                    </button>
                    <button class={tabPassClass} onclick={handleTabPass}>
                        Pass <span class="tab-badge tab-badge-pass">{_passCount}</span>
                    </button>
                    <span class="tab-spacer"></span>
                    <span class="badge badge-time">{_elapsedTime}</span>
                </div>

                <div class="results-list">
                    <template for:each={filteredResults} for:item="result">
                        <div key={result.id} class={result.rowClass}>
                            <div class="result-header">
                                <lightning-icon icon-name={result.iconName} variant={result.iconVariant} size="x-small" class="result-icon"></lightning-icon>
                                <span class="result-setting">{result.setting}</span>
                            </div>
                            <template lwc:if={result.description}>
                                <lightning-formatted-rich-text value={result.description} class="result-description"></lightning-formatted-rich-text>
                            </template>
                            <template lwc:if={result.solution}>
                                <lightning-formatted-rich-text value={result.solution} class="result-solution"></lightning-formatted-rich-text>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </article>
</template>
