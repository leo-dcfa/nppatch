<template>
    <lightning-card title="Health Check" icon-name="utility:heart">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <p class="section-description">
                Health Check validates your NPPatch configuration and data integrity.
                It checks for common issues like missing required settings, invalid record type references,
                broken trigger handlers, and data inconsistencies.
            </p>

            <div class="action-row slds-m-top_medium">
                <template lwc:if={_isRunning}>
                    <div class="slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
                        <div class="slds-col">
                            <lightning-spinner alternative-text="Running" size="small" class="inline-spinner"></lightning-spinner>
                        </div>
                        <div class="slds-col">
                            <p class="running-message">{_runningMessage}</p>
                        </div>
                    </div>
                </template>
                <template lwc:else>
                    <lightning-button label="Run Health Check" onclick={handleRunHealthCheck} variant="brand"></lightning-button>
                </template>
            </div>

            <template lwc:if={_hasResults}>
                <div class="results-summary slds-m-top_medium">
                    <div class="summary-badges">
                        <span class="badge badge-pass">{_passCount} Passed</span>
                        <span class="badge badge-fail">{_failCount} Failed</span>
                        <span class="badge badge-warn">{_warnCount} Warnings</span>
                        <span class="badge badge-time">{_elapsedTime}</span>
                    </div>
                </div>

                <div class="results-list slds-m-top_small">
                    <template for:each={_results} for:item="result">
                        <div key={result.id} class={result.rowClass}>
                            <div class="result-header">
                                <lightning-icon icon-name={result.iconName} size="x-small" class="result-icon"></lightning-icon>
                                <span class="result-setting">{result.setting}</span>
                            </div>
                            <template lwc:if={result.description}>
                                <p class="result-description">{result.description}</p>
                            </template>
                            <template lwc:if={result.solution}>
                                <p class="result-solution"><strong>Solution:</strong> {result.solution}</p>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
