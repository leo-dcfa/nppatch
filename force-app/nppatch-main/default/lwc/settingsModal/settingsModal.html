<template>
    <lightning-modal-header label={panelTitle}></lightning-modal-header>
    <lightning-modal-body>
        <template lwc:if={isAccountModelPanel}>
            <c-stg-panel-account-model></c-stg-panel-account-model>
        </template>
        <template lwc:if={isLeadsPanel}>
            <c-stg-panel-leads></c-stg-panel-leads>
        </template>
        <template lwc:if={isAffiliationsPanel}>
            <c-stg-panel-affiliations></c-stg-panel-affiliations>
        </template>
        <template lwc:if={isMembershipPanel}>
            <c-stg-panel-membership></c-stg-panel-membership>
        </template>
        <template lwc:if={isPaymentsPanel}>
            <c-stg-panel-payments></c-stg-panel-payments>
        </template>
        <template lwc:if={isDonorStatisticsPanel}>
            <c-stg-panel-donor-statistics></c-stg-panel-donor-statistics>
        </template>
        <template lwc:if={isCampaignMembersPanel}>
            <c-stg-panel-campaign-members></c-stg-panel-campaign-members>
        </template>
        <template lwc:if={isContactRolesPanel}>
            <c-stg-panel-contact-roles></c-stg-panel-contact-roles>
        </template>
        <template lwc:if={isAllocationsPanel}>
            <c-stg-panel-allocations></c-stg-panel-allocations>
        </template>
        <template lwc:if={isDuplicateRulesPanel}>
            <c-stg-panel-duplicate-rules></c-stg-panel-duplicate-rules>
        </template>
        <template lwc:if={isErrorNotifPanel}>
            <c-stg-panel-error-notif></c-stg-panel-error-notif>
        </template>
        <template lwc:if={isRelationshipsPanel}>
            <c-stg-panel-relationships></c-stg-panel-relationships>
        </template>
        <template lwc:if={isHouseholdsPanel}>
            <c-stg-panel-households></c-stg-panel-households>
        </template>
        <template lwc:if={isSchedulePanel}>
            <c-stg-panel-schedule></c-stg-panel-schedule>
        </template>
        <template lwc:if={isRelReciprocalPanel}>
            <c-stg-panel-rel-reciprocal></c-stg-panel-rel-reciprocal>
        </template>
        <template lwc:if={isRelAutoCreatePanel}>
            <c-stg-panel-rel-auto-create></c-stg-panel-rel-auto-create>
        </template>
        <template lwc:if={isOppNamingPanel}>
            <c-stg-panel-opp-naming></c-stg-panel-opp-naming>
        </template>
        <template lwc:if={isPaymentMappingPanel}>
            <c-stg-panel-payment-mapping></c-stg-panel-payment-mapping>
        </template>
        <template lwc:if={isTdtmPanel}>
            <c-stg-panel-tdtm></c-stg-panel-tdtm>
        </template>
        <template lwc:if={isAddressVerificationPanel}>
            <c-stg-panel-addr-verification></c-stg-panel-addr-verification>
        </template>
        <template lwc:if={isCustomizableRollupsPanel}>
            <c-stg-panel-customizable-rollups></c-stg-panel-customizable-rollups>
        </template>
        <template lwc:if={isRd2StatusMappingPanel}>
            <c-stg-panel-rd2-status-mapping></c-stg-panel-rd2-status-mapping>
        </template>
        <template lwc:if={isRd2StatusAutomationPanel}>
            <c-stg-panel-rd2-status-automation></c-stg-panel-rd2-status-automation>
        </template>
        <template lwc:if={isAdvancedMappingPanel}>
            <c-stg-panel-advanced-mapping></c-stg-panel-advanced-mapping>
        </template>
    </lightning-modal-body>
    <template lwc:if={showModalFooter}>
        <lightning-modal-footer>
            <lightning-button label="Cancel" onclick={handleCancel} class="slds-m-right_x-small"></lightning-button>
            <lightning-button label="Save" variant="brand" onclick={handleSave} disabled={_isSaving}></lightning-button>
        </lightning-modal-footer>
    </template>
</template>
