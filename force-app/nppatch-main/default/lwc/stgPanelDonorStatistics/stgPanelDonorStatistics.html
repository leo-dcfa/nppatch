<template>
    <template lwc:if={isLoading}>
        <div class="slds-is-relative slds-p-around_large">
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
    </template>

    <template lwc:if={_hasError}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <p>{_errorMessage}</p>
        </div>
    </template>

    <template lwc:if={_settings}>
        <div class="slds-is-relative slds-p-around_medium">
            <p class="slds-text-color_weak slds-text-body_medium slds-m-bottom_medium">{sectionDescription}</p>

            <lightning-input type="number" label={labels.nDayValue}
                field-level-help={labels.helpNDayValue}
                value={_workingCopy.Rollup_N_Day_Value__c}
                onchange={handleNDayChange}>
            </lightning-input>

            <lightning-input type="toggle" label={labels.fiscalYear}
                field-level-help={labels.helpFiscalYear}
                checked={_workingCopy.Use_Fiscal_Year_for_Rollups__c}
                onchange={handleFiscalYearChange}
                message-toggle-active="Enabled" message-toggle-inactive="Disabled">
            </lightning-input>

            <template lwc:if={showExclusionFields}>
                <lightning-dual-listbox
                    label={labels.exclAcctOppRT}
                    field-level-help={labels.helpExclAcctRT}
                    source-label="Available" selected-label="Excluded"
                    options={_oppRecordTypes}
                    value={selectedExclAcctOppRT}
                    onchange={handleExclAcctRTChange}>
                </lightning-dual-listbox>

                <lightning-dual-listbox
                    label={labels.exclAcctOppType}
                    field-level-help={labels.helpExclAcctType}
                    source-label="Available" selected-label="Excluded"
                    options={_oppTypes}
                    value={selectedExclAcctOppType}
                    onchange={handleExclAcctTypeChange}>
                </lightning-dual-listbox>

                <lightning-dual-listbox
                    label={labels.exclConOppRT}
                    field-level-help={labels.helpExclConRT}
                    source-label="Available" selected-label="Excluded"
                    options={_oppRecordTypes}
                    value={selectedExclConOppRT}
                    onchange={handleExclConRTChange}>
                </lightning-dual-listbox>

                <lightning-dual-listbox
                    label={labels.exclConOppType}
                    field-level-help={labels.helpExclConType}
                    source-label="Available" selected-label="Excluded"
                    options={_oppTypes}
                    value={selectedExclConOppType}
                    onchange={handleExclConTypeChange}>
                </lightning-dual-listbox>
            </template>
        </div>
    </template>
</template>
