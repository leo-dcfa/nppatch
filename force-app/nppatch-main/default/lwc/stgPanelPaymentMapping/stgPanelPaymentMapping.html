<template>
    <template if:true={isLoading}>
        <div class="loading-container">
            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
        </div>
    </template>

    <template if:true={_hasError}>
        <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
            <span class="slds-assistive-text">error</span>
            <p>{_errorMessage}</p>
        </div>
    </template>

    <template if:true={_settings}>
        <div class="panel-container">
            <div class="panel-header">
                <p class="section-description">{labels.description}</p>
            </div>

            <div class="panel-body">
                <template if:true={canEdit}>
                    <div class="action-bar">
                        <lightning-button label="New" onclick={handleNew} variant="neutral" disabled={_isCreating}></lightning-button>
                    </div>
                </template>

                <template if:true={hasFieldLoadError}>
                    <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_small" role="alert">
                        <p>{_fieldLoadError}</p>
                    </div>
                </template>

                <template if:true={_isCreating}>
                    <div class="create-form">
                        <h3 class="section-subheader">New Payment Field Mapping</h3>
                        <div class="form-grid">
                            <lightning-combobox
                                label="Opportunity Field"
                                value={_newRecord.Opportunity_Field__c}
                                options={oppFieldOptions}
                                onchange={handleNewOpportunityFieldChange}
                                placeholder="Select a field..."
                                required
                            ></lightning-combobox>
                            <lightning-combobox
                                label="Payment Field"
                                value={_newRecord.Payment_Field__c}
                                options={pmtFieldOptions}
                                onchange={handleNewPaymentFieldChange}
                                placeholder="Select a field..."
                                required
                            ></lightning-combobox>
                        </div>
                        <div class="form-actions">
                            <lightning-button label="Save" onclick={handleSaveNew} variant="brand" disabled={_isSaving}></lightning-button>
                            <lightning-button label="Cancel" onclick={handleCancelNew} variant="neutral" disabled={_isSaving}></lightning-button>
                        </div>
                    </div>
                </template>

                <template if:true={_isEditing}>
                    <div class="create-form">
                        <h3 class="section-subheader">Edit Payment Field Mapping</h3>
                        <div class="form-grid">
                            <lightning-combobox
                                label="Opportunity Field"
                                value={_editRecord.Opportunity_Field__c}
                                options={oppFieldOptions}
                                onchange={handleEditOpportunityFieldChange}
                                required
                            ></lightning-combobox>
                            <lightning-combobox
                                label="Payment Field"
                                value={_editRecord.Payment_Field__c}
                                options={pmtFieldOptions}
                                onchange={handleEditPaymentFieldChange}
                                required
                            ></lightning-combobox>
                        </div>
                        <div class="form-actions">
                            <lightning-button label="Save" onclick={handleSaveEdit} variant="brand" disabled={_isSaving}></lightning-button>
                            <lightning-button label="Cancel" onclick={handleCancelEdit} variant="neutral" disabled={_isSaving}></lightning-button>
                        </div>
                    </div>
                </template>

                <template if:true={hasRecords}>
                    <lightning-datatable
                        key-field="Id"
                        data={displayRecords}
                        columns={columns}
                        hide-checkbox-column
                        onrowaction={handleRowAction}>
                    </lightning-datatable>
                </template>
                <template lwc:if={showEmptyMessage}>
                    <p class="empty-message">No payment field mappings defined.</p>
                </template>
            </div>
        </div>
    </template>
</template>
