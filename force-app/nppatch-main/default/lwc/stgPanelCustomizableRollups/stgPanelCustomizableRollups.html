<template>
    <div class="panel-container">
        <div class="panel-header">
            <h2 class="slds-text-heading_small">
                <span class="slds-text-color_weak">Donations</span>
                <span class="slds-text-color_weak"> &bull; </span>
                Customizable Rollups
            </h2>
            <p class="section-description">Customizable Rollups calculate summary totals — like total donations, largest gift, and giving streaks — on Accounts, Contacts, and General Accounting Units. These rollups use Customizable Rollup Definitions to determine which Opportunities and Payments to include, which fields to summarize, and how to aggregate the results.</p>
        </div>
        <div class="panel-body">
            <div class="info-card">
                <p class="info-text">Customizable Rollup definitions are managed in the Customizable Rollups configuration page. Use the link below to view and edit rollup definitions, filter groups, and filter rules.</p>
                <div class="slds-m-top_medium">
                    <lightning-button label="Open Customizable Rollups Configuration" onclick={handleOpenCRLP} variant="brand"></lightning-button>
                </div>
            </div>
        </div>
    </div>
</template>
